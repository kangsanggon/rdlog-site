<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDLog 관리자 대시보드</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background:#0B1D2E; color:#fff; min-height:100vh; }
  .header { background:#0d2035; padding:20px 24px; border-bottom:1px solid rgba(255,255,255,.08); display:flex; align-items:center; justify-content:space-between; }
  .logo { font-size:22px; font-weight:900; } .logo span { color:#00B894; }
  .badge { background:rgba(0,184,148,.2); color:#00B894; padding:6px 14px; border-radius:20px; font-size:13px; font-weight:700; border:1px solid #00B894; }
  .main { padding:24px; max-width:1000px; margin:0 auto; }
  .tabs { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
  .tab { padding:10px 20px; border-radius:10px; border:1.5px solid rgba(255,255,255,.12); background:transparent; color:rgba(255,255,255,.5); font-size:14px; font-weight:600; cursor:pointer; }
  .tab.active { background:#00B894; border-color:#00B894; color:#fff; }
  .login-wrap { display:flex; align-items:center; justify-content:center; min-height:80vh; }
  .login-card { background:#0d2035; border-radius:20px; padding:40px; width:100%; max-width:400px; border:1px solid rgba(255,255,255,.08); }
  .login-title { font-size:22px; font-weight:800; margin-bottom:8px; }
  .login-sub { color:rgba(255,255,255,.4); font-size:14px; margin-bottom:28px; }
  .input { width:100%; background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.1); border-radius:12px; padding:14px 16px; font-size:15px; color:#fff; outline:none; margin-bottom:12px; }
  .input:focus { border-color:#00B894; }
  textarea.input { min-height:300px; font-family:monospace; font-size:13px; resize:vertical; }
  .btn { padding:12px 24px; border-radius:10px; border:none; font-size:14px; font-weight:700; cursor:pointer; }
  .btn-primary { background:#00B894; color:#fff; } .btn-primary:hover { background:#00a070; }
  .btn-secondary { background:rgba(255,255,255,.08); color:#fff; border:1.5px solid rgba(255,255,255,.12); }
  .btn-danger { background:#E53E3E; color:#fff; }
  .card { background:#0d2035; border-radius:16px; padding:20px; margin-bottom:16px; border:1px solid rgba(255,255,255,.06); }
  .card-title { font-size:16px; font-weight:800; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px; }
  .stat { background:#0d2035; border-radius:14px; padding:18px; border:1px solid rgba(255,255,255,.06); text-align:center; }
  .stat-num { font-size:28px; font-weight:900; color:#00B894; margin-bottom:4px; }
  .stat-label { font-size:13px; color:rgba(255,255,255,.4); }
  .tip-item { display:flex; gap:10px; align-items:flex-start; background:rgba(255,255,255,.04); border-radius:10px; padding:12px; margin-bottom:8px; }
  .tip-icon { font-size:20px; min-width:28px; }
  .tip-cat { font-size:11px; color:#00B894; font-weight:700; margin-bottom:4px; }
  .tip-text { font-size:13px; color:rgba(255,255,255,.7); line-height:1.6; }
  .tip-actions { display:flex; gap:6px; margin-top:6px; }
  .btn-sm { padding:4px 10px; font-size:12px; border-radius:6px; border:none; cursor:pointer; font-weight:600; }
  .deadline-item { display:flex; justify-content:space-between; align-items:center; padding:12px; background:rgba(255,255,255,.04); border-radius:10px; margin-bottom:8px; }
  .deadline-title { font-size:14px; font-weight:700; margin-bottom:2px; }
  .deadline-date { font-size:12px; color:rgba(255,255,255,.4); }
  .deadline-amount { font-size:12px; color:#00B894; font-weight:600; }
  .urgent-badge { background:rgba(229,62,62,.2); color:#E53E3E; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:700; border:1px solid rgba(229,62,62,.3); }
  .form-row { display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .form-group { flex:1; min-width:150px; }
  .form-label { font-size:12px; color:rgba(255,255,255,.5); margin-bottom:4px; display:block; }
  .success-msg { background:rgba(0,184,148,.15); border:1px solid rgba(0,184,148,.3); color:#00B894; padding:12px 16px; border-radius:10px; margin-bottom:16px; font-size:14px; }
  .info-box { background:rgba(59,130,246,.1); border:1px solid rgba(59,130,246,.3); color:#3B82F6; padding:14px 16px; border-radius:10px; margin-bottom:16px; font-size:13px; line-height:1.8; }
  @media(max-width:600px) { .stats { grid-template-columns:repeat(2,1fr); } }
</style>
</head>
<body>
<div class="header">
  <div class="logo">RD<span>Log</span> 관리자</div>
  <div id="headerBadge"></div>
</div>
<div class="main" id="app"></div>

<script>
const API = 'https://rdlog-server-production.up.railway.app';
let adminKey = '';
let activeTab = 'dashboard';
let requests = [];
let content = { tips:[], taxEvents:[], deadlines:[] };
let successMsg = '';

function render() {
  const app = document.getElementById('app');
  if (!adminKey) { app.innerHTML = renderLogin(); return; }
  app.innerHTML = `
    <div class="tabs">
      ${['dashboard','managed','tips','deadlines'].map(t => `
        <button class="tab ${activeTab===t?'active':''}" onclick="setTab('${t}')">
          ${{dashboard:'📊 대시보드', managed:'📋 대행 요청', tips:'💡 경영 팁', deadlines:'🏛 마감 일정'}[t]}
        </button>`).join('')}
    </div>
    ${successMsg ? `<div class="success-msg">✅ ${successMsg}</div>` : ''}
    ${activeTab === 'dashboard'  ? renderDashboard()  : ''}
    ${activeTab === 'managed'    ? renderManaged()    : ''}
    ${activeTab === 'tips'       ? renderTips()       : ''}
    ${activeTab === 'deadlines'  ? renderDeadlines()  : ''}
  `;
}

/* ── 대시보드 ── */
function renderDashboard() {
  const pending   = requests.filter(r=>r.status==='pending').length;
  const processing= requests.filter(r=>r.status==='processing').length;
  const completed = requests.filter(r=>r.status==='completed').length;
  return `
    <div class="stats">
      <div class="stat"><div class="stat-num">${pending}</div><div class="stat-label">⏳ 대기 중</div></div>
      <div class="stat"><div class="stat-num" style="color:#3B82F6">${processing}</div><div class="stat-label">⚙️ 처리 중</div></div>
      <div class="stat"><div class="stat-num">${completed}</div><div class="stat-label">✅ 완료</div></div>
    </div>
    <div class="card">
      <div class="card-title">📌 빠른 현황</div>
      <p style="color:rgba(255,255,255,.5);font-size:14px">
        총 대행 요청: ${requests.length}건 | 
        경영 팁: ${content.tips.length}개 | 
        마감 일정: ${content.deadlines.length}개
      </p>
      <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="loadAll()">↻ 전체 새로고침</button>
        <button class="btn btn-secondary" onclick="setTab('managed')">📋 대행 요청 보기</button>
      </div>
    </div>
    <div class="info-box">
      💡 <strong>콘텐츠 업데이트 방법</strong><br>
      경영 팁 탭에서 팁을 추가/삭제하면 앱 사용자에게 즉시 반영됩니다.<br>
      마감 일정 탭에서 정부지원 마감일을 관리할 수 있습니다.<br>
      서버 재시작 시 기본값으로 초기화됩니다.
    </div>`;
}

/* ── 대행 요청 ── */
function renderManaged() {
  if (!requests.length) return `<div class="card"><p style="text-align:center;color:rgba(255,255,255,.3);padding:40px">요청이 없습니다</p></div>`;
  return requests.map(r => `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>
          <div style="font-size:11px;color:rgba(255,255,255,.3);font-family:monospace">${r.requestId}</div>
          <div style="font-size:17px;font-weight:700;margin:4px 0">${r.customerName} · ${r.companyName||'-'}</div>
          <div style="font-size:13px;color:rgba(255,255,255,.4)">${r.customerEmail} · ${new Date(r.createdAt).toLocaleString('ko-KR')}</div>
          <div style="font-size:14px;color:#00B894;font-weight:600;margin-top:4px">📋 ${r.projectName}</div>
        </div>
        <span style="padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700;background:${r.status==='pending'?'rgba(255,193,7,.15)':r.status==='completed'?'rgba(0,184,148,.15)':'rgba(59,130,246,.15)'};color:${r.status==='pending'?'#FFC107':r.status==='completed'?'#00B894':'#3B82F6'}">
          ${r.status==='pending'?'⏳ 대기':r.status==='completed'?'✅ 완료':'⚙️ 처리중'}
        </span>
      </div>
      ${r.status !== 'completed' ? `
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${r.status==='pending'?`<button class="btn btn-secondary btn-sm" onclick="markProcessing('${r.requestId}')" style="padding:8px 14px">⚙️ 처리 시작</button>`:''}
          <button class="btn btn-primary btn-sm" onclick="openComplete('${r.requestId}')" style="padding:8px 14px">✅ 완성본 전달</button>
        </div>` : ''}
    </div>`).join('');
}

/* ── 경영 팁 관리 ── */
function renderTips() {
  return `
    <div class="card">
      <div class="card-title">💡 새 팁 추가</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">이모지</label>
          <input class="input" id="newTipIcon" placeholder="💰" style="padding:10px">
        </div>
        <div class="form-group">
          <label class="form-label">카테고리</label>
          <select class="input" id="newTipCat" style="padding:10px">
            <option>절세</option><option>R&D</option><option>정부지원</option>
            <option>노무</option><option>인증</option><option>자금</option>
            <option>법무</option><option>경영</option>
          </select>
        </div>
      </div>
      <textarea class="input" id="newTipText" placeholder="팁 내용을 입력하세요..." style="min-height:80px;margin-bottom:10px"></textarea>
      <button class="btn btn-primary" onclick="addTip()">+ 팁 추가</button>
    </div>
    <div class="card">
      <div class="card-title">📋 현재 팁 목록 (${content.tips.length}개)</div>
      ${content.tips.map((tip, i) => `
        <div class="tip-item">
          <div class="tip-icon">${tip.icon}</div>
          <div style="flex:1">
            <div class="tip-cat">${tip.category}</div>
            <div class="tip-text">${tip.tip}</div>
          </div>
          <button class="btn-sm btn-danger" onclick="deleteTip(${i})" style="background:#E53E3E;color:#fff;min-width:50px">삭제</button>
        </div>`).join('')}
    </div>`;
}

/* ── 마감 일정 관리 ── */
function renderDeadlines() {
  return `
    <div class="card">
      <div class="card-title">🏛 새 마감 일정 추가</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">사업명 *</label>
          <input class="input" id="newDlTitle" placeholder="초기창업패키지" style="padding:10px">
        </div>
        <div class="form-group">
          <label class="form-label">마감일 * (YYYY-MM-DD)</label>
          <input class="input" id="newDlDate" placeholder="2026-06-30" style="padding:10px">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">지원 금액</label>
          <input class="input" id="newDlAmount" placeholder="최대 1억원" style="padding:10px">
        </div>
        <div class="form-group">
          <label class="form-label">링크 URL</label>
          <input class="input" id="newDlUrl" placeholder="https://..." style="padding:10px">
        </div>
      </div>
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer">
        <input type="checkbox" id="newDlUrgent"> <span style="font-size:14px">긴급 표시</span>
      </label>
      <button class="btn btn-primary" onclick="addDeadline()">+ 일정 추가</button>
    </div>
    <div class="card">
      <div class="card-title">📅 현재 마감 일정 (${content.deadlines.length}개)</div>
      ${content.deadlines.map((d, i) => {
        const dday = Math.ceil((new Date(d.date) - new Date()) / 86400000);
        return `
        <div class="deadline-item">
          <div>
            <div class="deadline-title">${d.title} ${d.urgent?'<span class="urgent-badge">긴급</span>':''}</div>
            <div class="deadline-date">${d.date} · ${d.amount}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:14px;font-weight:900;color:${dday<=14?'#E53E3E':dday<=30?'#D97706':'#00B894'}">D-${dday}</span>
            <button class="btn-sm btn-danger" onclick="deleteDeadline(${i})" style="background:#E53E3E;color:#fff">삭제</button>
          </div>
        </div>`;}).join('')}
    </div>`;
}

/* ── 로그인 ── */
function renderLogin() {
  return `<div class="login-wrap"><div class="login-card">
    <div style="font-size:40px;text-align:center;margin-bottom:16px">🔐</div>
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">RDLog 관리자 패널</div>
    <input class="input" type="password" id="keyInput" placeholder="관리자 키 입력" onkeydown="if(event.key==='Enter')login()">
    <button class="btn btn-primary" style="width:100%" onclick="login()">로그인</button>
  </div></div>`;
}

/* ── 액션 함수들 ── */
async function login() {
  const key = document.getElementById('keyInput').value.trim();
  if (!key) return;
  adminKey = key;
  document.getElementById('headerBadge').innerHTML = `<div class="badge">관리자</div>`;
  await loadAll();
}

async function loadAll() {
  await Promise.all([loadRequests(), loadContent()]);
  render();
}

async function loadRequests() {
  try {
    const res = await fetch(`${API}/api/managed/list?adminKey=${adminKey}`);
    if (!res.ok) { alert('인증 실패'); adminKey=''; render(); return; }
    const data = await res.json();
    requests = data.requests || [];
  } catch {}
}

async function loadContent() {
  try {
    const res = await fetch(`${API}/api/content/all`);
    if (res.ok) content = await res.json();
  } catch {}
}

function setTab(tab) { activeTab = tab; successMsg = ''; render(); }

async function addTip() {
  const icon = document.getElementById('newTipIcon').value.trim() || '💡';
  const cat  = document.getElementById('newTipCat').value;
  const tip  = document.getElementById('newTipText').value.trim();
  if (!tip) { alert('팁 내용을 입력해 주세요.'); return; }
  const newTips = [...content.tips, { icon, category:cat, tip }];
  await updateContent('tips', newTips);
}

async function deleteTip(idx) {
  if (!confirm('삭제하시겠습니까?')) return;
  const newTips = content.tips.filter((_, i) => i !== idx);
  await updateContent('tips', newTips);
}

async function addDeadline() {
  const title  = document.getElementById('newDlTitle').value.trim();
  const date   = document.getElementById('newDlDate').value.trim();
  const amount = document.getElementById('newDlAmount').value.trim() || '상시 신청';
  const url    = document.getElementById('newDlUrl').value.trim() || '#';
  const urgent = document.getElementById('newDlUrgent').checked;
  if (!title || !date) { alert('사업명과 마감일을 입력해 주세요.'); return; }
  const newDeadlines = [...content.deadlines, { title, date, amount, url, urgent }];
  await updateContent('deadlines', newDeadlines);
}

async function deleteDeadline(idx) {
  if (!confirm('삭제하시겠습니까?')) return;
  const newDeadlines = content.deadlines.filter((_, i) => i !== idx);
  await updateContent('deadlines', newDeadlines);
}

async function updateContent(type, data) {
  try {
    const res = await fetch(`${API}/api/content/update`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ adminKey, type, data }),
    });
    if (!res.ok) throw new Error('업데이트 실패');
    content[type] = data;
    successMsg = `${type === 'tips' ? '경영 팁' : '마감 일정'}이 업데이트되었습니다! 앱에 즉시 반영됩니다.`;
    render();
  } catch(e) { alert('업데이트 실패: ' + e.message); }
}

async function markProcessing(requestId) {
  try {
    await fetch(`${API}/api/managed/processing`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ adminKey, requestId }),
    });
    await loadRequests(); render();
  } catch {}
}

let completeTarget = null;
function openComplete(requestId) {
  completeTarget = requestId;
  const note = prompt('완성된 연구노트 내용을 입력하세요:');
  if (note) sendComplete(requestId, note);
}

async function sendComplete(requestId, note) {
  try {
    const res = await fetch(`${API}/api/managed/complete`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ adminKey, requestId, resultNote: note }),
    });
    if (!res.ok) throw new Error('전송 실패');
    successMsg = '완성본이 고객에게 전송되었습니다!';
    await loadRequests(); render();
  } catch(e) { alert('오류: ' + e.message); }
}

render();
</script>
</body>
</html>
